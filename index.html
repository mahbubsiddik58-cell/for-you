<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Shraboni ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
            font-family: 'Hind Siliguri', sans-serif;
            text-align: center;
            overflow: hidden;
            transition: background 0.5s;
        }

        .container {
            background: rgba(255, 255, 255, 0.4);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
            width: 85%;
            z-index: 10;
        }

        h1 {
            color: #d63384;
            font-size: 24px;
            line-height: 1.5;
        }

        .shraboni-name {
            font-size: 32px;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            color: #b00b69;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .btn-group {
            margin-top: 40px;
            height: 150px;
            position: relative;
        }

        button {
            padding: 15px 35px;
            font-size: 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.1s;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            position: absolute;
            left: 20px;
        }

        #noBtn {
            background-color: #888;
            color: white;
            position: absolute;
            right: 20px;
        }

        /* গোপন বিড়াল এবং হুমকির কনটেইনার */
        #catContainer {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9); /* হালকা কালো ব্যাকগ্রাউন্ড */
            z-index: 20;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            animation: fadeIn 0.5s ease-in-out;
        }

        #catImage {
            max-width: 80%;
            height: auto;
            border: 5px solid #ff4d6d;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .humi-text {
            font-size: 24px;
            font-weight: bold;
            color: #ff4d6d;
            padding: 0 20px;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container" id="mainBox">
        <h1>প্রিয়, <span class="shraboni-name">শ্রাবণী</span></h1>
        <p style="font-size: 18px; color: #555;">তুমি কি সারাটা জীবন আমার হাতটা ধরে থাকবে?</p>
        <p style="font-size: 20px; color: #b00b69;"><b>Will you be my Valentine? 🌹</b></p>

        <div class="btn-group">
            <button id="yesBtn" onclick="accepted()">হ্যাঁ</button>
            <button id="noBtn" onmouseover="moveBtn()" ontouchstart="moveBtn()">না</button>
        </div>
    </div>

    <div id="catContainer">
        <img id="catImage" src="https://i.imgur.com/vU1I6fD.jpeg" alt="Gun Cat">
        <p class="humi-text">তুমি Accept না করলে গুলি মারতাম! 🔫</p>
        <p style="font-size: 18px;">আই লাভ ইউ! 😘</p>
    </div>

    <script>
        function moveBtn() {
            const noBtn = document.getElementById('noBtn');
            const padding = 60;
            
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - padding);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - padding);
            
            noBtn.style.position = "fixed";
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function accepted() {
            // ১. মূল বক্সটি বন্ধ করা
            document.getElementById('mainBox').style.display = 'none';
            // ২. বিড়াল এবং হুমকির অংশটি দেখানো
            document.getElementById('catContainer').style.display = 'flex';
            document.body.style.background = "black"; // ব্যাকগ্রাউন্ড কালো করা
            
            // ৩. ৩ সেকেন্ড পর অটোমেটিক সেই মজার ভিডিওর লিঙ্কে নিয়ে যাবে
            setTimeout(() => {
                window.location.href = "https://www.youtube.com/watch?v=S_8qU2F13zI";
            }, 3000);
        }
    </script>
</body>
</html>
